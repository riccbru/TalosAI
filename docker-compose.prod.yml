services:

  db:
    image: postgres:16-alpine
    container_name: talos_db
    restart: always
    environment:
      POSTGRES_DB: ${POSTGRES_DB}
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      timeout: 3s
      interval: 3s
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/app/db/init:/docker-entrypoint-initdb.d:ro
    networks:
      - talos_network

  backend:
    build: ./backend
    ports:
      - "8000:8000"
    networks:
      - talos_network
    volumes:
      - ./backend/app:/app/app
      - /var/run/docker.sock:/var/run/docker.sock
    container_name: talos_backend
    command: uvicorn main:app --host 0.0.0.0 --port 8000 --reload --app-dir /app/app
    env_file:
      - .env
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      db:
        condition: service_healthy
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]
  
  metasploitable:
    image: tleemcjr/metasploitable2
    container_name: talos_metasploitable
    networks:
      - talos_network
    ports:
      - "8081:80"      # Web Console (Mutillidae, DVWA)
      - "2121:21"      # FTP
      - "2222:22"      # SSH
      - "2323:23"      # Telnet
      - "4444:4444"    # Metasploit Default Listener
      - "3306:3306"    # MySQL
      - "5433:5432"    # PostgreSQL
      - "8180:8180"    # Apache Tomcat
    stdin_open: true
    tty: true
    command: >
      sh -c "/bin/services.sh && bash"

networks:
  talos_network:
    driver: bridge
    name: talos_network

volumes:
  postgres_data: